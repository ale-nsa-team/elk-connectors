#####################
#  Input Section    #
#####################
# This section defines the input source for Logstash.
# In this case, Logstash listens for events from Beats on port 5044.
input {
  beats {
    port => 5044
  }
}

#####################
#  Filter Section   #
#####################
filter {

  ############################
  # RADIUS Log Processing   #
  ############################
  # Apply only if the "radius" tag exists in the event
  if "radius" in [tags] {

    # Ruby filter to extract specific fields from RADIUS logs
    ruby {
      code => '
        msg = event.get("message")
        if msg
          # Extract username from the message
          if msg =~ /User-Name\s*=\s*"([^"]+)"/
            event.set("username", $1)
          end
          # Extract NAS IP address
          if msg =~ /NAS-IP-Address\s*=\s*([^\s]+)/   
            event.set("nas_ip", $1)
          end
          # Extract client IP address
          if msg =~ /Framed-IP-Address\s*=\s*([^\s]+)/
            event.set("src_ip", $1)
          end
          # Extract Filter ID
          if msg =~ /Filter-Id\s*=\s*"([^"]+)"/
            event.set("filter_id", $1)
          end
          # Extract MAC address
          if msg =~ /Calling-Station-Id\s*=\s*"([^"]+)"/
            event.set("mac_address", $1)
          end
          # Extract VLAN ID
          if msg =~ /Tunnel-Private-Group-Id:0\s*=\s*"([^"]+)"/
            event.set("vlan_id", $1)
          end
          # Extract accounting status type
          if msg =~ /Acct-Status-Type\s*=\s*([^\s]+)/m
            event.set("acct_status_type", $1)
          end
          # Extract NAS identifier
          if msg =~ /NAS-Identifier\s*=\s*"([^"]+)"/
            event.set("nas_identifier", $1)
          end
          # Extract called station ID
          if msg =~ /Called-Station-Id\s*=\s*"([^"]+)"/
            event.set("called_station_id", $1)
          end
          # Extract accounting session ID
          if msg =~ /Acct-Session-Id\s*=\s*"([^"]+)"/
            event.set("acct_session_id", $1)
          end
          # Extract event timestamp
          if msg =~ /Event-Timestamp\s*=\s*"([^"]+)"/
            event.set("event_timestamp", $1)
          end
          # Extract NAS port number
          if msg =~ /NAS-Port\s*=\s*(\d+)/
            event.set("nas_port", $1.to_i)
          end
          # Extract NAS port ID
          if msg =~ /NAS-Port-Id\s*=\s*"([^"]+)"/
            event.set("nas_port_id", $1)
          end
          # Extract Xylan device information
          if msg =~ /Xylan-Device-Name\s*=\s*"([^"]+)"/
            event.set("xylan_device_name", $1)
          end
          if msg =~ /Xylan-Device-Location\s*=\s*"([^"]+)"/
            event.set("xylan_device_location", $1)
          end
          # Extract NAS port type
          if msg =~ /NAS-Port-Type\s*=\s*([^\s]+)/ 
            event.set("nas_port_type", $1)
          end
          # Extract traffic metrics
          if msg =~ /Acct-Input-Octets\s*=\s*(\d+)/
            event.set("acct_input_octets", $1.to_i)
          end
          if msg =~ /Acct-Output-Octets\s*=\s*(\d+)/
            event.set("acct_output_octets", $1.to_i)
          end
          if msg =~ /Acct-Input-Packets\s*=\s*(\d+)/
            event.set("acct_input_packets", $1.to_i)
          end
          if msg =~ /Acct-Output-Packets\s*=\s*(\d+)/
            event.set("acct_output_packets", $1.to_i)
          end
          if msg =~ /Acct-Delay-Time\s*=\s*(\d+)/
            event.set("acct_delay_time", $1.to_i)
          end
          # Extract Xylan port description
          if msg =~ /Xylan-Port-Desc\s*=\s*"([^"]+)"/
            event.set("xylan_port_desc", $1)
          end
          # Extract unique session ID
          if msg =~ /Acct-Unique-Session-Id\s*=\s*"([^"]+)"/
            event.set("acct_unique_session_id", $1)
          end
          # Extract UNIX timestamp
          if msg =~ /Timestamp\s*=\s*(\d+)/
            event.set("timestamp", $1.to_i)
          end
        end
      '
    }

    # Convert numeric fields to integer for proper indexing in Elasticsearch
    mutate {
      convert => {
        "acct_session_time"     => "integer"
        "acct_input_octets"     => "integer"
        "acct_output_octets"    => "integer"
        "acct_input_packets"    => "integer"
        "acct_output_packets"   => "integer"
        "acct_delay_time"       => "integer"
        "nas_port"              => "integer"
        "vlan_id"               => "integer"
        "timestamp"             => "integer"
      }
    }

    # Convert UNIX timestamp to @timestamp for Elasticsearch
    if [timestamp] {
      date {
        match => ["timestamp", "UNIX"]
        target => "@timestamp"
      }
    }
 }

##########################
# DPI Log Processing     #
##########################
if "dpi" in [tags] {

  if "enforcement" in [tags] {
    # Parsing DPI enforcement CSV logs
    csv {
      separator => ","
      skip_header => true
      columns => [
        "IpAddrType", "IpA", "IpB", "L4portA", "L4portB", "Proto", "Application", "Application-Group",
        "MacA", "UnpNameA", "MacB", "UnpNameB", "pktCount", "byteCount",
        "Start", "End", "IntStart", "IntEnd"
      ]
    }
    mutate {
      rename => {
        "IpA"              => "src_ip"
        "IpB"              => "dst_ip"
        "L4portA"          => "src_port"
        "L4portB"          => "dst_port"
        "Proto"            => "protocol"
        "MacA"             => "src_mac"
        "MacB"             => "dst_mac"
        "Application"      => "application"
        "Application-Group"=> "app_group"
        "UnpNameA"         => "src_user"
        "UnpNameB"         => "dst_user"
        "Start"            => "start_time"
        "End"              => "end_time"
        "IntStart"         => "internal_start"
        "IntEnd"           => "internal_end"
      }
      convert => {
        "src_port"   => "integer"
        "dst_port"   => "integer"
        "pktCount"   => "integer"
        "byteCount"  => "integer"
      }
    }
    date { match => ["start_time", "yyyy-MM-dd HH:mm:ss"] target => "start_time" }
    date { match => ["end_time",   "yyyy-MM-dd HH:mm:ss"] target => "end_time" }
    date { match => ["start_time", "yyyy-MM-dd HH:mm:ss"] target => "@timestamp" }

  } else if "monitoring" in [tags] {
    # Parsing DPI monitoring CSV logs
    csv {
      separator => ","
      skip_header => true
      columns => [
        "IpAddrType", "IpA", "IpB", "L4portA", "L4portB", "Proto", "MacA", "MacB",
        "Application", "Application-Group", "Time", "InterfaceName"
      ]
    }
    mutate {
      rename => {
        "IpA"              => "src_ip"
        "IpB"              => "dst_ip"
        "L4portA"          => "src_port"
        "L4portB"          => "dst_port"
        "Proto"            => "protocol"
        "MacA"             => "src_mac"
        "MacB"             => "dst_mac"
        "Application"      => "application"
        "Application-Group"=> "app_group"
        "Time"             => "event_time"
        "InterfaceName"    => "interface_name"
      }
      convert => {
        "src_port"   => "integer"
        "dst_port"   => "integer"
      }
    }
    date { match => ["event_time", "yyyy-MM-dd HH:mm:ss"] target => "event_time" }
    date { match => ["event_time", "ISO8601"] target => "@timestamp" }
  }
}

###########################
# Fortigate Traffic Logs   #
###########################
if "syslog" in [tags] {
  # Extract structured fields from Fortigate syslog messages using grok
  grok {
    match => { "message" => "date=%{DATE:date}" }
    tag_on_failure => []
  }
  grok { match => { "message" => "time=%{TIME:time}" } tag_on_failure => [] }
  grok { match => { "message" => "devname=\"%{DATA:devname}\"" } tag_on_failure => [] }
  grok { match => { "message" => "devid=\"%{DATA:devid}\"" } tag_on_failure => [] }
  grok { match => { "message" => "eventtime=%{NUMBER:eventtime}" } tag_on_failure => [] }
  grok { match => { "message" => "type=\"%{WORD:type}\"" } tag_on_failure => [] }
  grok { match => { "message" => "subtype=\"%{WORD:subtype}\"" } tag_on_failure => [] }
  grok { match => { "message" => "level=\"%{WORD:level}\"" } tag_on_failure => [] }
  grok { match => { "message" => "srcip=%{IP:srcip}" } tag_on_failure => [] }
  grok { match => { "message" => "srcport=%{NUMBER:srcport}" } tag_on_failure => [] }
  grok { match => { "message" => "dstip=%{IP:dstip}" } tag_on_failure => [] }
  grok { match => { "message" => "dstport=%{NUMBER:dstport}" } tag_on_failure => [] }
  grok { match => { "message" => "srccountry=\"%{DATA:srccountry}\"" } tag_on_failure => [] }
  grok { match => { "message" => "dstcountry=\"%{DATA:dstcountry}\"" } tag_on_failure => [] }
  grok { match => { "message" => "action=\"%{WORD:action}\"" } tag_on_failure => [] }
  grok { match => { "message" => "policyid=%{NUMBER:policyid}" } tag_on_failure => [] }
  grok { match => { "message" => "policytype=\"%{DATA:policytype}\"" } tag_on_failure => [] }
  grok { match => { "message" => "service=\"%{DATA:service}\"" } tag_on_failure => [] }
  grok { match => { "message" => "trandisp=\"%{DATA:trandisp}\"" } tag_on_failure => [] }
  grok { match => { "message" => "app=\"%{DATA:app}\"" } tag_on_failure => [] }
  grok { match => { "message" => "duration=%{NUMBER:duration}" } tag_on_failure => [] }
  grok { match => { "message" => "sentbyte=%{NUMBER:sentbyte}" } tag_on_failure => [] }
  grok { match => { "message" => "rcvdbyte=%{NUMBER:rcvdbyte}" } tag_on_failure => [] }
  grok { match => { "message" => "sentpkt=%{NUMBER:sentpkt}" } tag_on_failure => [] }
  grok { match => { "message" => "rcvdpkt=%{NUMBER:rcvdpkt}" } tag_on_failure => [] }
  grok { match => { "message" => "crscore=%{NUMBER:crscore}" } tag_on_failure => [] }
  grok { match => { "message" => "craction=%{NUMBER:craction}" } tag_on_failure => [] }
  grok { match => { "message" => "crlevel=\"%{WORD:crlevel}\"" } tag_on_failure => [] }
  grok { match => { "message" => "transip=%{IP:transip}" } tag_on_failure => [] }

  # Convert numeric fields to integers
  mutate {
    convert => {
      "srcport"   => "integer"
      "dstport"   => "integer"
      "policyid"  => "integer"
      "duration"  => "integer"
      "sentbyte"  => "integer"
      "rcvdbyte"  => "integer"
      "sentpkt"   => "integer"
      "rcvdpkt"   => "integer"
      "crscore"   => "integer"
      "craction"  => "integer"
    }
  }
}

######################
# Output Section     #
######################
# Send processed logs to Elasticsearch and optionally stdout for debugging
output {
  if "radius" in [tags] {
    stdout { codec => rubydebug }  # Debug output
    elasticsearch {
      hosts => ["http://localhost:9200"]
      index => "sw-radius-logs-%{+YYYY.MM.dd}"  # Daily RADIUS index
    }
  }

  if "dpi" in [tags] {
    stdout { codec => rubydebug }
    elasticsearch {
      hosts => ["http://localhost:9200"]
      index => "sw-dpi-logs-test-%{+YYYY.MM.dd}"  # Daily DPI index
    }
  }

  if "syslog" in [tags] {
    stdout { codec => rubydebug }
    elasticsearch {
      hosts => ["http://localhost:9200"]
      index => "sw-firewall-syslog%{+YYYY.MM.dd}"  # Daily firewall syslog index
    }
  }
}

